<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Smart Guess Game</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 50px; }
        .box { border: 2px solid #00ffcc; border-radius: 15px; padding: 20px; max-width: 500px; margin: 20px auto; background: #222; }
        input { padding: 10px; border-radius: 5px; border: none; width: 60%; margin-top: 10px; font-size: 16px; }
        button { padding: 10px 20px; background-color: #00ffcc; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #00cca3; }
        #message { margin-top: 20px; font-weight: bold; color: #ffcc00; font-size: 18px; }
        .team-info { font-style: italic; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>🎮 Smart Guess Game</h1>

    <div class="box">
        <h2>About</h2>
        <p>هذه اللعبة تعتمد على ذكاء التخمين، حاول معرفة الرقم السري!</p>
    </div>

    <div class="box">
        <h2>ابدأ اللعب</h2>
        <p>خمن الرقم بين 1 و 100</p>
        <input type="number" id="userGuess" placeholder="أدخل رقمك...">
        <br>
        <button onclick="checkGuess()">تخمين!</button>
        <p id="message"></p>
        <button onclick="resetGame()" style="display:none;" id="resetBtn">إعادة اللعب</button>
    </div>

    <div class="box">
        <h2>Team</h2>
        <p class="team-info">Jaafar Saif, Fatima Mohammed & Zahraa Faeq</p>
    </div>

    <script>
        let randomNumber = Math.floor(Math.random() * 100) + 1;
        let attempts = 0;

        function checkGuess() {
            let guess = document.getElementById('userGuess').value;
            let message = document.getElementById('message');
            attempts++;

            if (!guess) {
                message.innerHTML = "الرجاء إدخال رقم أولاً!";
                return;
            }

            if (guess == randomNumber) {
                message.innerHTML = `🎉 مبروك! حزرت الرقم ${randomNumber} بـ ${attempts} محاولات.`;
                document.getElementById('resetBtn').style.display = 'inline-block';
            } else if (guess > randomNumber) {
                message.innerHTML = "الرقم كبير جداً! حاول أصغر. 👇";
            } else {
                message.innerHTML = "الرقم صغير جداً! حاول أكبر. 👆";
            }
        }

        function resetGame() {
            randomNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            document.getElementById('message').innerHTML = "";
            document.getElementById('userGuess').value = "";
            document.getElementById('resetBtn').style.display = 'none';
        }
    </script>
</body>
</html>
